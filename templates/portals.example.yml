# career-ops-devang Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery)
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Set enabled: false on companies you don't care about
#   5. Set your sector_focus to filter scan results

# -- Sector focus --
# Controls which company segments to prioritize in scans
sector_focus:
  product_startups: true
  gccs: true
  ai_native: true
  consulting: false              # Set true if targeting Big 4 / SI practices

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive)

title_filter:
  positive:
    # -- AI/ML roles --
    - "AI"
    - "ML"
    - "Machine Learning"
    - "LLM"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "AI Engineer"
    - "ML Engineer"
    - "Applied AI"
    - "Computer Vision"
    # -- Data roles --
    - "Data Scientist"
    - "Applied Scientist"
    - "Analytics"
    # -- Engineering with AI context --
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    # -- Product roles --
    - "Product Manager"
    - "Technical PM"
    # -- Leadership --
    - "Head of AI"
    - "Head of Data"
    - "VP AI"
    - "Transformation"
  negative:
    - "Junior"
    - "Intern"
    - "Trainee"
    - "Fresher"
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "Mainframe"
    - "COBOL"
    - "SAP "
    - "Oracle EBS"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "BPO"
    - "Voice Process"
    - "Non-Voice"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Manager"

# -- Search queries --
# Indian job boards and portals

search_queries:

  # -- LinkedIn India --
  - name: LinkedIn — AI/ML Engineer India
    query: 'site:linkedin.com/jobs "AI Engineer" OR "ML Engineer" OR "LLMOps" India remote OR Bangalore OR Mumbai OR Hyderabad'
    enabled: true

  - name: LinkedIn — AI PM India
    query: 'site:linkedin.com/jobs "AI Product Manager" OR "Technical PM AI" India remote OR Bangalore'
    enabled: true

  - name: LinkedIn — GenAI Engineer India
    query: 'site:linkedin.com/jobs "GenAI" OR "Generative AI" OR "LLM Engineer" India Senior OR Staff OR Lead'
    enabled: true

  # -- Naukri --
  - name: Naukri — AI/ML Senior
    query: 'site:naukri.com "machine learning" OR "AI engineer" OR "LLM" Senior OR Lead Bangalore OR Mumbai OR remote'
    enabled: true

  - name: Naukri — Data Scientist Senior
    query: 'site:naukri.com "data scientist" Senior OR Lead OR Principal Bangalore OR Mumbai OR Hyderabad'
    enabled: true

  # -- iimjobs (senior/leadership roles) --
  - name: iimjobs — AI/ML Leadership
    query: 'site:iimjobs.com "AI" OR "machine learning" OR "data science" Senior OR Lead OR Head OR Director'
    enabled: true

  - name: iimjobs — AI PM
    query: 'site:iimjobs.com "AI Product Manager" OR "Head of AI" OR "AI Strategy"'
    enabled: true

  # -- Cutshort (tech-focused) --
  - name: Cutshort — AI/ML Engineer
    query: 'site:cutshort.io "AI engineer" OR "ML engineer" OR "LLMOps" OR "GenAI"'
    enabled: true

  - name: Cutshort — AI PM
    query: 'site:cutshort.io "AI product manager" OR "technical PM" AI'
    enabled: true

  # -- Instahire / Foundit --
  - name: Foundit — AI/ML Senior
    query: 'site:foundit.in "AI" OR "machine learning" Senior Bangalore OR Mumbai OR remote'
    enabled: true

  # -- Wellfound (startups globally, India-friendly) --
  - name: Wellfound — AI Engineer India startups
    query: 'site:wellfound.com "AI engineer" OR "ML engineer" India remote'
    enabled: true

  # -- Greenhouse / Ashby / Lever (Indian companies using these ATS) --
  - name: Greenhouse — Indian AI companies
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI" OR "ML" India OR Bangalore OR remote India'
    enabled: true

  - name: Ashby — Indian AI startups
    query: 'site:jobs.ashbyhq.com "AI" OR "ML" OR "LLM" India OR Bangalore OR remote'
    enabled: true

  # -- YC India portfolio --
  - name: YC — India AI startups
    query: 'site:workatastartup.com "AI" OR "ML" OR "LLM" India remote'
    enabled: true

  # -- International remote roles (for India-based candidates) --
  - name: Remote — International AI roles open to India
    query: '"AI Engineer" OR "ML Engineer" OR "LLM Engineer" remote "open to India" OR "India timezone" OR IST'
    enabled: true

